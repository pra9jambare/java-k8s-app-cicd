apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-k8s-app

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  selector:
    matchLabels:
      app: java-k8s-app

  template:
    metadata:
      labels:
        app: java-k8s-app

    spec:
      containers:
      - name: java-k8s-app
        image: pranavjambare/java-k8s-app:latest

        ports:
        - containerPort: 8080
